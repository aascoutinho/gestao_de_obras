AWSTemplateFormatVersion: '2010-09-09'
Description: Configuração de tabelas DynamoDB para o Portal Gerenciador (Module Obras)

Resources:
  # Tabela de Projetos (Obras)
  ProjectsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Obras_Projects
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  # Tabela de Turmas
  TeamsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Obras_Teams
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  # Tabela de RDOs (Dados Extraídos)
  RDOsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Obras_RDOs
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: teamId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: teamId-index
          KeySchema:
            - AttributeName: teamId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST

  # Política de Acesso para o Portal
  PortalDynamoDBPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: PortalObrasDynamoDBPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:GetItem
              - dynamodb:UpdateItem
              - dynamodb:DeleteItem
              - dynamodb:Query
              - dynamodb:Scan
            Resource:
              - !GetAtt ProjectsTable.Arn
              - !GetAtt TeamsTable.Arn
              - !GetAtt RDOsTable.Arn
              - !Sub "${RDOsTable.Arn}/index/*"

Outputs:
  ProjectsTableName:
    Description: Nome da tabela de Projetos
    Value: !Ref ProjectsTable
  TeamsTableName:
    Description: Nome da tabela de Turmas
    Value: !Ref TeamsTable
  RDOsTableName:
    Description: Nome da tabela de RDOs
    Value: !Ref RDOsTable
